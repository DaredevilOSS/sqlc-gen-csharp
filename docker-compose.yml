services:
  plugin-tests-dotnet-core:
    container_name: ${TESTS_DOTNET_CORE_CONTAINER}
    build:
      context: .
      dockerfile: dotnet_core.Dockerfile
    restart: on-failure
    env_file:
      - .env
    command: "dotnet test EndToEndTests/EndToEndTests.csproj"
    depends_on:
      mysqldb:
        condition: service_healthy
      postgresdb:
        condition: service_healthy
        
  plugin-tests-dotnet-framework:
    container_name: ${TESTS_DOTNET_FRAMEWORK_CONTAINER}
    build:
      context: .
      dockerfile: dotnet_framework.Dockerfile
    restart: on-failure
    env_file:
      - .env
    command: "dotnet test LegacyEndToEndTests/LegacyEndToEndTests.csproj"
    depends_on:
      mysqldb:
        condition: service_healthy
      postgresdb:
        condition: service_healthy
      plugin-tests-dotnet-core: # verifying the tests data operations won't conflict
        condition: service_completed_successfully
        
  mysqldb:
    container_name: mysqldb
    build: examples/authors/mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: tests
      MYSQL_ALLOW_EMPTY_PASSWORD: true
    healthcheck:
      test: "mysqladmin ping -h 127.0.0.1"
      timeout: 20s
      retries: 10
      
  postgresdb:
    container_name: postgresdb
    build: examples/authors/postgresql
    restart: always
    ports:
      - "8080:8080"
    environment:
      POSTGRES_DB: tests
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    healthcheck:
      test: "pg_isready -d tests"
      timeout: 20s
      retries: 10